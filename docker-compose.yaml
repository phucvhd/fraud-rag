version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: fraud-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fraud_db

