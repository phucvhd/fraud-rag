database:
  url: "postgresql://user:password@postgres:5432/fraud_db"
  batch_size: 50

kafka:
  bootstrap_servers: "kafka:29092"
  topic: "transaction-decisions"
  group_id: "fraud-rag-group"

embedding:
  model_name: "all-MiniLM-L6-v2"
  dimension: 384

llm:
  provider: "openai"
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  model_name: "gpt-4o"